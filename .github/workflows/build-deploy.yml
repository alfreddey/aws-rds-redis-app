name: build-and-deploy

# Build the image, push it to ECR, and ship a blue/green deployment.
# Auth is GitHub OIDC only (no long-lived keys).
#
# Ordering is deliberate: push the immutable :<sha> tag and upload config.zip
# BEFORE :latest. The EventBridge rule fires on :latest and starts the pipeline,
# so pushing it last keeps the deploy race-free. Before the infra stack exists,
# only the image is published.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "diagrams/**"
  workflow_dispatch:

permissions:
  id-token: write    # required for OIDC
  contents: read

# Repository Variables: AWS_REGION, ECR_REPOSITORY, INFRA_STACK_NAME.
# Secret: AWS_APP_ROLE_ARN (bootstrap output GitHubActionsAppRoleArn).
env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  INFRA_STACK_NAME: ${{ vars.INFRA_STACK_NAME }}

concurrency:
  group: build-and-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "21"
          cache: maven

      - name: Build and test
        run: ./mvnw -B verify

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_APP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image and push immutable SHA tag
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/${ECR_REPOSITORY}"
          docker build -t "${IMAGE}:${GITHUB_SHA::7}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${GITHUB_SHA::7}"   # :latest pushed last, to trigger the pipeline
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Resolve infrastructure outputs
        id: infra
        run: |
          set -euo pipefail
          STACK=$(aws cloudformation describe-stacks --stack-name "$INFRA_STACK_NAME" 2>/dev/null) || {
            echo "Infra stack '$INFRA_STACK_NAME' not found - bootstrap phase, publishing image only."
            echo "ready=false" >> "$GITHUB_OUTPUT"; exit 0
          }
          out() { jq -r --arg k "$1" '.Stacks[0].Outputs[]|select(.OutputKey==$k).OutputValue' <<<"$STACK"; }
          {
            echo "ready=true"
            echo "exec_role=$(out TaskExecutionRoleArn)"
            echo "task_role=$(out TaskRoleArn)"
            echo "db_proxy=$(out DBProxyEndpoint)"
            echo "redis=$(out RedisPrimaryEndpoint)"
            echo "db_secret=$(out DBSecretArn)"
            echo "config_bucket=$(out AppConfigBucketName)"
          } >> "$GITHUB_OUTPUT"

      - name: Render taskdef.json and upload config.zip
        if: steps.infra.outputs.ready == 'true'
        env:
          EXEC_ROLE: ${{ steps.infra.outputs.exec_role }}
          TASK_ROLE: ${{ steps.infra.outputs.task_role }}
          DB_PROXY: ${{ steps.infra.outputs.db_proxy }}
          REDIS: ${{ steps.infra.outputs.redis }}
          DB_SECRET: ${{ steps.infra.outputs.db_secret }}
          CONFIG_BUCKET: ${{ steps.infra.outputs.config_bucket }}
        run: |
          set -euo pipefail
          # '#' delimiter: ARNs/endpoints contain '/' and ':' but never '#'.
          # <IMAGE1_NAME> stays literal: CodeDeploy substitutes it from the ECR artifact.
          sed -i \
              -e "s#<EXECUTION_ROLE_ARN>#${EXEC_ROLE}#g" \
              -e "s#<TASK_ROLE_ARN>#${TASK_ROLE}#g" \
              -e "s#<DB_PROXY_ENDPOINT>#${DB_PROXY}#g" \
              -e "s#<REDIS_PRIMARY_ENDPOINT>#${REDIS}#g" \
              -e "s#<DB_SECRET_ARN>#${DB_SECRET}#g" \
              -e "s#<AWS_REGION>#${AWS_REGION}#g" \
              taskdef.json
          zip -j config.zip taskdef.json appspec.yaml
          aws s3 cp config.zip "s3://${CONFIG_BUCKET}/config.zip"

      - name: Push :latest (triggers EventBridge -> CodePipeline -> CodeDeploy)
        env:
          IMAGE: ${{ steps.build.outputs.image }}
        run: docker push "${IMAGE}:latest"
