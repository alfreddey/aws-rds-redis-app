<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>To-Do · ECS Fargate + RDS Proxy + Redis</title>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --panel-2: #273449;
            --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8;
            --accent-2: #22c55e; --danger: #f87171; --border: #334155;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.5;
        }
        .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 64px; }
        header h1 { margin: 0 0 4px; font-size: 1.6rem; }
        header p { margin: 0 0 24px; color: var(--muted); font-size: .9rem; }
        .card {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 12px; padding: 18px; margin-bottom: 18px;
        }
        form.add { display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; gap: 10px; }
        .row > * { flex: 1; }
        input[type=text], textarea {
            width: 100%; background: var(--panel-2); border: 1px solid var(--border);
            color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: .95rem;
        }
        textarea { resize: vertical; min-height: 40px; }
        button {
            cursor: pointer; border: none; border-radius: 8px; padding: 10px 16px;
            font-size: .9rem; font-weight: 600; color: #06121f; background: var(--accent);
        }
        button.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
        button.danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        button:hover { filter: brightness(1.08); }
        ul.tasks { list-style: none; margin: 0; padding: 0; }
        li.task {
            display: flex; align-items: flex-start; gap: 12px; padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }
        li.task:last-child { border-bottom: none; }
        li.task input[type=checkbox] { margin-top: 4px; width: 18px; height: 18px; accent-color: var(--accent-2); }
        .task-body { flex: 1; min-width: 0; }
        .task-title { font-weight: 600; word-break: break-word; }
        .task-title.done { text-decoration: line-through; color: var(--muted); }
        .task-desc { color: var(--muted); font-size: .88rem; white-space: pre-wrap; word-break: break-word; }
        .task-meta { color: #64748b; font-size: .75rem; margin-top: 4px; }
        .actions { display: flex; gap: 8px; }
        .status { font-size: .82rem; color: var(--muted); min-height: 1.2em; }
        .status b { color: var(--accent); }
        .empty { color: var(--muted); text-align: center; padding: 24px 0; }
        a { color: var(--accent); }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <h1>To-Do</h1>
        <p>Spring Boot on ECS Fargate · writes &rarr; RDS (via RDS Proxy) · reads cached in ElastiCache Redis</p>
    </header>

    <div class="card">
        <form class="add" id="add-form">
            <input type="text" id="title" placeholder="What needs doing?" maxlength="255" required/>
            <textarea id="description" placeholder="Notes (optional)" maxlength="10000"></textarea>
            <div class="row" style="flex: 0;">
                <button type="submit">Add task</button>
            </div>
        </form>
    </div>

    <div class="card">
        <div class="status" id="status">Loading&hellip;</div>
        <ul class="tasks" id="tasks"></ul>
    </div>
</div>

<script>
    const API = "/api/tasks";
    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");

    function setStatus(html) { statusEl.innerHTML = html; }
    function escapeHtml(s) {
        return (s ?? "").replace(/[&<>"']/g, (c) => (
            {"&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"}[c]
        ));
    }
    function fmt(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        return isNaN(d) ? iso : d.toLocaleString();
    }

    async function loadTasks() {
        const start = performance.now();
        try {
            const res = await fetch(API);
            if (!res.ok) throw new Error("HTTP " + res.status);
            const tasks = await res.json();
            const ms = Math.round(performance.now() - start);
            render(tasks);
            setStatus(`${tasks.length} task(s) · loaded in <b>${ms} ms</b> (repeat loads are served from the Redis cache)`);
        } catch (e) {
            setStatus(`Failed to load tasks: ${escapeHtml(e.message)}`);
        }
    }

    function render(tasks) {
        const list = $("tasks");
        list.innerHTML = "";
        if (!tasks.length) {
            list.innerHTML = '<li class="empty">No tasks yet — add one above.</li>';
            return;
        }
        for (const t of tasks) {
            const li = document.createElement("li");
            li.className = "task";
            li.innerHTML = `
                <input type="checkbox" ${t.completed ? "checked" : ""} title="Toggle complete"/>
                <div class="task-body">
                    <div class="task-title ${t.completed ? "done" : ""}">${escapeHtml(t.title)}</div>
                    ${t.description ? `<div class="task-desc">${escapeHtml(t.description)}</div>` : ""}
                    <div class="task-meta">#${t.id} · created ${escapeHtml(fmt(t.createdAt))}</div>
                </div>
                <div class="actions">
                    <button class="secondary" data-act="edit">Edit</button>
                    <button class="danger" data-act="delete">Delete</button>
                </div>`;
            li.querySelector('input[type=checkbox]').addEventListener("change", (e) => toggle(t, e.target.checked));
            li.querySelector('[data-act=edit]').addEventListener("click", () => edit(t));
            li.querySelector('[data-act=delete]').addEventListener("click", () => remove(t));
            list.appendChild(li);
        }
    }

    async function send(method, url, body) {
        const res = await fetch(url, {
            method,
            headers: body ? {"Content-Type": "application/json"} : undefined,
            body: body ? JSON.stringify(body) : undefined,
        });
        if (!res.ok && res.status !== 204) {
            let detail = "HTTP " + res.status;
            try { const j = await res.json(); detail = j.message || detail; } catch (_) {}
            throw new Error(detail);
        }
        return res.status === 204 ? null : res.json();
    }

    $("add-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const title = $("title").value.trim();
        if (!title) return;
        try {
            await send("POST", API, {title, description: $("description").value.trim(), completed: false});
            $("title").value = ""; $("description").value = "";
            await loadTasks();
        } catch (err) { setStatus("Create failed: " + escapeHtml(err.message)); }
    });

    async function toggle(t, completed) {
        try {
            await send("PUT", `${API}/${t.id}`, {title: t.title, description: t.description, completed});
            await loadTasks();
        } catch (err) { setStatus("Update failed: " + escapeHtml(err.message)); await loadTasks(); }
    }

    async function edit(t) {
        const title = prompt("Title:", t.title);
        if (title === null) return;
        const description = prompt("Notes:", t.description || "");
        if (description === null) return;
        try {
            await send("PUT", `${API}/${t.id}`, {title: title.trim(), description: description.trim(), completed: t.completed});
            await loadTasks();
        } catch (err) { setStatus("Update failed: " + escapeHtml(err.message)); }
    }

    async function remove(t) {
        if (!confirm(`Delete "${t.title}"?`)) return;
        try { await send("DELETE", `${API}/${t.id}`); await loadTasks(); }
        catch (err) { setStatus("Delete failed: " + escapeHtml(err.message)); }
    }

    loadTasks();
</script>
</body>
</html>
